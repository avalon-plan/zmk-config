# ==========================================
# 1. 鼠标指针与高精度平滑滚动核心配置
# ==========================================
# 开启鼠标/滚轮功能支持
CONFIG_ZMK_POINTING=y
# 启动 ZMK 的平滑滚动机制
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# 允许使用全功能消费级媒体键报告（控制音量、切歌必开）
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

# ==========================================
# 2. AS5600 磁编码器驱动行为配置
# ==========================================
# 激活引入的第三方 ams AS5600 驱动程序
CONFIG_ZMK_INPUT_AMS_AS5600=y
# 首次硬件开机调试时建议开启此项，可通过 USB 查看 AGC 日志调试磁铁间距
CONFIG_ZMK_INPUT_AMS_AS5600_LOG_AGC=y
# 设定芯片数据的轮询采样间隔（20毫秒）
CONFIG_ZMK_INPUT_AMS_AS5600_POLL_INTERVAL=20

# ==========================================
# 3. ZMK Studio 网页端在线实时改键配置
# ==========================================
# 开启 ZMK 官方全新的 Studio 在线改键功能
CONFIG_ZMK_STUDIO=y
# 关闭 Studio 的锁定安全机制（免密码直接连入网页改键）
CONFIG_ZMK_STUDIO_LOCKING=n
# 扩大 RPC 缓冲区大小，防止旋钮数据传输时卡死
CONFIG_ZMK_STUDIO_RPC_RECV_BUFFER_SIZE=512

# ==========================================
# 4. 新版 RGB 灯珠控制配置
# ==========================================
# 【核心修正】开启 ZMK RGB 背光底灯控制总开关（新版靠这一行和设备树自动开启WS2812驱动）
CONFIG_ZMK_RGB_UNDERGLOW=y

# ==========================================
# 5. 蓝牙功耗控制与系统休眠微调
# ==========================================
# 开启 USB 日志串行调试（配合看 LOG 日志）
CONFIG_ZMK_USB_LOGGING=y
# 允许键盘在静止一段时间后自动进入低功耗休眠
CONFIG_ZMK_SLEEP=y
# 5分钟没有操作，关闭外设进入浅度省电状态
CONFIG_ZMK_IDLE_TIMEOUT=300000
# 15分钟没有操作，彻底切断外设，进入深度休眠
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
